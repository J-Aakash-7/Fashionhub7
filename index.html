<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lina Bella Boutique | College Wear</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5d4; 
            --bg-overlay: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(var(--bg-overlay), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1567401893414-76b7b1e5a7a5?q=80&w=870&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        /* Brand Section */
        .brand-section { text-align: center; padding: 60px 20px 20px; position: relative; }
        .brand-section .main-logo {
            width: 100px; height: auto; margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(0,245,212,0.5));
        }
        .brand-section h2 { 
            font-family: 'Playfair Display', serif; font-size: 32px; 
            letter-spacing: 2px;
        }

        .track-header {
            position: absolute; top: 20px; right: 20px;
            padding: 8px 15px; border: 1px solid var(--primary);
            color: var(--primary); text-decoration: none;
            border-radius: 20px; font-size: 10px; font-weight: 700;
            text-transform: uppercase;
        }

        /* Search & Filter */
        .controls-container { max-width: 600px; margin: 0 auto 40px; padding: 0 20px; text-align: center; }
        .search-box {
            width: 100%; padding: 15px 25px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50px;
            color: #fff; font-size: 14px; margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 245, 212, 0.2); }

        .categories { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .cat-btn {
            padding: 8px 15px; background: transparent; border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; cursor: pointer; border-radius: 20px; font-size: 11px; text-transform: uppercase; transition: 0.3s;
        }
        .cat-btn.active, .cat-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Grid */
        .container { padding: 0 20px 50px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px;
            overflow: hidden; transition: 0.4s ease;
        }
        .card img { width: 100%; height: 350px; object-fit: cover; cursor: zoom-in; }
        .card-content { padding: 20px; text-align: center; }
        .price { font-size: 20px; color: var(--primary); font-weight: 700; margin-bottom: 15px; }

        .btn { 
            width: 100%; padding: 12px; border: 1px solid var(--primary); 
            background: transparent; color: var(--primary); 
            cursor: pointer; font-weight: 700; text-transform: uppercase; border-radius: 4px;
        }
        .btn:hover { background: var(--primary); color: #000; }

        /* Modals */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000;
        }
        .order-modal-content {
            background: #fff; padding: 30px; border-radius: 12px;
            width: 90%; max-width: 400px; color: #000; text-align: center; position: relative;
        }
        .size-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        .size-chip { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700; }
        .size-chip.selected { background: #000; color: #fff; border-color: #000; }
        
        /* Address Bar Styling */
        .address-box {
            width: 100%;
            height: 80px;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            outline: none;
        }

        .order-options { display: flex; flex-direction: column; gap: 10px; opacity: 0.2; pointer-events: none; margin-top: 15px; }
        .order-options.active { opacity: 1; pointer-events: auto; }
        .method-btn { padding: 14px; border-radius: 4px; font-weight: 700; text-decoration: none; display: block; }
        .method-btn.wa { background: #25D366; color: #fff; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: #999; }

        /* Image Preview Modal */
        #previewModal .order-modal-content { background: transparent; max-width: 80%; padding: 0; }
        #previewModal img { max-width: 100%; max-height: 80vh; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        /* Cancellation UI */
        .footer-actions { text-align: center; padding: 20px 20px 100px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .track-btn-large { display: inline-block; padding: 12px 25px; border: 1px solid #fff; color: #fff; text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 12px; }
        .cancel-trigger { color: #999; font-size: 11px; text-decoration: underline; cursor: pointer; border: none; background: none; }

        .cancel-input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-family: monospace; font-size: 16px; }

        .floating-contact { position: fixed; bottom: 25px; right: 25px; background: var(--primary); color: #000; padding: 12px 20px; font-size: 11px; font-weight: 800; border-radius: 4px; text-decoration: none; }
    </style>
</head>
<body>

<div class="brand-section">
    <a href="https://wa.me/918122668602?text=Hello%20Lina%20Bella!%20Where%20is%20my%20order?" class="track-header">Track Order</a>
    <img src="logo.png" class="main-logo" alt="Logo">
    <h2>Lina Bella</h2>
</div>

<div class="controls-container">
    <input type="text" id="searchInput" class="search-box" placeholder="Search collection..." onkeyup="filterAll()">
    <div class="categories">
        <button class="cat-btn active" onclick="setCategory('All', this)">All</button>
        <button class="cat-btn" onclick="setCategory('Short Kurtha', this)">Short Kurtha</button>
        <button class="cat-btn" onclick="setCategory('Formal', this)">Formal</button>
        <button class="cat-btn" onclick="setCategory('Ethnic', this)">Ethnic</button>
    </div>
</div>

<div class="container">
    <div class="grid" id="productList"></div>
</div>

<div class="footer-actions">
    <a href="https://wa.me/918122668602?text=Hello%20Lina%20Bella!%20Where%20is%20my%20order?" class="track-btn-large">🚚 TRACK MY ORDER</a>
    <button class="cancel-trigger" onclick="openCancelModal()">Need to cancel an order?</button>
</div>

<!-- Order Modal -->
<div class="modal" id="orderModal">
    <div class="order-modal-content">
        <span class="close" onclick="closeOrderModal()">&times;</span>
        <h3 id="modalProdName">Product Name</h3>
        <p style="font-size: 10px; color: #666; margin-top: 5px;">Your Temporary Order ID: <span id="tempOrderId" style="font-weight: 700; color: #000;"></span></p>
        
        <div class="size-container">
            <div class="size-chip" onclick="selectSize('XS', this)">XS</div>
            <div class="size-chip" onclick="selectSize('S', this)">S</div>
            <div class="size-chip" onclick="selectSize('M', this)">M</div>
            <div class="size-chip" onclick="selectSize('L', this)">L</div>
            <div class="size-chip" onclick="selectSize('XL', this)">XL</div>
            <div class="size-chip" onclick="selectSize('XXL', this)">XXL</div>
        </div>

        <!-- Address Bar -->
        <textarea id="customerAddress" class="address-box" placeholder="Enter full delivery address (House No, Street, City, Pincode)..." oninput="updateWAMessage()"></textarea>

        <div class="order-options" id="orderActions">
            <!-- UPI QR -->
<img id="upiQR" style="width:200px;margin-top:10px;display:none;border-radius:8px;" />
<p id="qrNote" style="font-size:11px;color:#666;display:none;">
Scan & pay using GPay / PhonePe / Paytm
</p>
          
<button class="method-btn" style="background:#000;color:#fff;" onclick="showQR()">
📷 Show QR Code
</button>   
 <textarea id="Transaction ID" class="address-box" placeholder="Enter the transaction ID" oninput="updateWAMessage()"></textarea>
         
    <a href="#" target="_blank" class="method-btn wa" id="waLink">📱 Confirm Order via WhatsApp</a>

    </div>
</div>

<!-- Image Preview Modal -->
<div class="modal" id="previewModal" onclick="closePreview()">
    <div class="order-modal-content">
        <img id="fullImage" src="" alt="Preview">
        <p style="color: #fff; margin-top: 10px; font-size: 12px;">Click anywhere to close</p>
    </div>
</div>

<!-- Cancellation Modal -->
<div class="modal" id="cancelModal">
    <div class="order-modal-content">
        <span class="close" onclick="closeCancelModal()">&times;</span>
        <h3>Cancel Order</h3>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">Enter your 6-digit Order ID to proceed</p>
        <input type="text" id="cancelOrderId" class="cancel-input" placeholder="e.g. LB-123456">
        <button class="method-btn wa" style="width:100%; border:none; cursor:pointer;" onclick="submitCancellation()">Request Cancellation</button>
    </div>
</div>

<a href="tel:8610328602" class="floating-contact">📞 CALL: 8610328602</a>

<script>
    const whatsappNumber = "918122668602";
    const upiId = "aakashjkmr@okicici";
    let currentCategory = "All";
    let selectedSize = "";
    let currentProduct = {};
    let generatedOrderId = "";

    const products = [
        { id: "100", name: "Floral Short Kurtha", price: 10, image: "image/sk.jpg", category: "Short Kurtha" },
        { id: "101", name: "Premium Blue Kurtha", price: 2999, image: "image/1.jpg", category: "Short Kurtha" },
        { id: "102", name: "White Formal Shirt", price: 1499, image: "image/2.jpg", category: "Formal" },
        { id: "103", name: "Ethnic Red Special", price: 899, image: "image/3.jpg", category: "Ethnic" },
        { id: "104", name: "Ethnic Red Special", price: 899, image: "image/4.jpg", category: "Ethnic" },
        { id: "105", name: "Ethnic Red Special", price: 899, image: "image/5.jpg", category: "Ethnic" },
        { id: "106", name: "Ethnic Red Special", price: 899, image: "image/6.jpg", category: "Ethnic" }
    ];

    function filterAll() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const productList = document.getElementById("productList");
        productList.innerHTML = "";
        const filtered = products.filter(p => {
            const matchesCat = currentCategory === "All" || p.category === currentCategory;
            const matchesSearch = p.name.toLowerCase().includes(searchTerm) || p.id.includes(searchTerm);
            return matchesCat && matchesSearch;
        });
        filtered.forEach(p => {
            productList.innerHTML += `
            <div class="card">
                <img src="${p.image}" onclick="openPreview('${p.image}')" title="Click to preview">
                <div class="card-content">
                    <h3>${p.name}</h3>
                    <div class="price">₹${p.price}</div>
                    <button class="btn" onclick="openOrderModal('${p.id}', '${p.name}', '${p.price}')">Buy Now</button>
                </div>
            </div>`;
        });
    }

    function setCategory(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterAll();
    }

    function openPreview(src) {
        document.getElementById("fullImage").src = src;
        document.getElementById("previewModal").style.display = "flex";
    }
    function closePreview() {
        document.getElementById("previewModal").style.display = "none";
    }

    function openOrderModal(id, name, price) {
        currentProduct = { id, name, price };
        selectedSize = "";
        document.getElementById("customerAddress").value = "";
        generatedOrderId = "LB-" + Math.floor(100000 + Math.random() * 900000);
        document.getElementById("modalProdName").innerText = name;
        document.getElementById("tempOrderId").innerText = generatedOrderId;
        document.getElementById("orderActions").classList.remove('active');
        document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('selected'));
        document.getElementById("orderModal").style.display = "flex";
    }

    function selectSize(size, element) {
        selectedSize = size;
        document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById("orderActions").classList.add('active');
        updateWAMessage();
    }
 function showQR() {
    if (!selectedSize) {
        alert("Please select size first");
        return;
    }

    const amount = currentProduct.price;
    const name = "Lina Bella";
    const note = `${currentProduct.name} (${selectedSize})`;

    const upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

    // Generate QR using API
    const qrURL = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;

    document.getElementById("upiQR").src = qrURL;
    document.getElementById("upiQR").style.display = "block";
    document.getElementById("qrNote").style.display = "block";
}

    function updateWAMessage() {
        if (!selectedSize) return;
        const address = document.getElementById("customerAddress").value;
        const message = `ORDER REQUEST\n------------\nOrder ID: ${generatedOrderId}\nItem: ${currentProduct.name}\nSize: ${selectedSize}\nPrice: ₹${currentProduct.price}\nTransaction ID:\n${address || 'Not provided yet'}\n\nDelivery Address:\n${address || 'Not provided yet'}`;
        document.getElementById("waLink").href = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
    }

    function closeOrderModal() { document.getElementById("orderModal").style.display = "none"; }

    function openCancelModal() { document.getElementById("cancelModal").style.display = "flex"; }
    function closeCancelModal() { document.getElementById("cancelModal").style.display = "none"; }
    
    function submitCancellation() {
        const id = document.getElementById("cancelOrderId").value;
        if(id.length < 3) { alert("Please enter a valid Order ID"); return; }
        const cancelMsg = `CANCELLATION REQUEST\n------------\nI would like to cancel my order.\nOrder ID: ${id}`;
        window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(cancelMsg)}`, '_blank');
        closeCancelModal();
    }

    window.onload = filterAll;
</script>
</body>
</html>
