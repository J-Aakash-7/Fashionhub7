<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background: radial-gradient(circle at top,#1a1a2e,#0f3460,#16213e);color:#fff;overflow-x:hidden}
header{padding:30px;text-align:center;font-size:32px;font-weight:600;letter-spacing:2px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px)}
.hero{text-align:center;padding:40px 20px}
.hero h1{font-size:40px;margin-bottom:10px}
.hero p{opacity:0.7}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px}
.card{background:rgba(255,255,255,0.08);border-radius:20px;backdrop-filter:blur(15px);box-shadow:0 8px 30px rgba(0,0,0,0.4);overflow:hidden;transition:0.4s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:180px;object-fit:cover;cursor:pointer}
.card-content{padding:15px}
.price{color:#00f5d4;font-weight:600;margin-bottom:10px}
.badge{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,#ff512f,#dd2476);padding:5px 10px;border-radius:10px;font-size:12px}
.btn{width:100%;padding:10px;border:none;border-radius:12px;background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;cursor:pointer}
.btn:hover{background:linear-gradient(135deg,#ff512f,#dd2476)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center}
.modal-content{background:#fff;color:#000;padding:20px;border-radius:15px;width:90%;max-width:500px}
.close{float:right;font-size:22px;cursor:pointer}

/* Image Preview */
.image-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center}
.image-modal img{max-width:90%;max-height:90%;border-radius:15px}
</style>
</head>
<body>

<header>Fashion hub</header>

<div class="hero">
<h1>Best quality, Affordable price</h1>
<p>Customer satisfaction is the primary goal</p>
</div>

<div class="container">
<div class="grid" id="productList"></div>
</div>

<!-- Buy Modal -->
<div class="modal" id="buyModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<h3>Complete Your Order</h3>
<iframe src="https://forms.gle/m7EyyPzhoYuJu6Nr9" width="100%" height="350"></iframe>
</div>
</div>

<!-- Image Preview Modal -->
<div class="image-modal" id="imageModal" onclick="closeImage()">
<img id="previewImg">
</div>

<footer style="text-align:center;padding:20px;opacity:0.6">© 2026 Elite Store | Designed by Aakash</footer>

<!-- Floating Contact -->
<div style="position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,0.7);color:#fff;padding:10px 15px;border-radius:10px;font-size:14px;box-shadow:0 4px 15px rgba(0,0,0,0.4);backdrop-filter:blur(5px);">
  📞For contact : 8610328602
      
</div>

<!-- Contact Modal -->
<div class="modal" id="contactModal">
  <div class="modal-content">
    <span class="close" onclick="closeContact()">&times;</span>
    <h3>Contact Us</h3>
    <p><strong>Phone:</strong> 8610328602</p>
    <p><strong>Email:</strong> aakashjkmr@gmail.com</p>
  </div>
</div>

<script>
let products=[
{name:"Short kurtha code-100",price:500,image:"image/sk.jpg"},
{name:"Short kurtha code-101",price:2999,image:"image/1.jpg"},
{name:"Short kurtha code-102",price:1499,image:"image/2.jpg"},
{name:"Short kurtha code-103",price:899,image:"image/4.jpg"}
];

function renderProducts(){
  let list=document.getElementById("productList");
  list.innerHTML="";
  products.forEach(p=>{
    list.innerHTML+=`
    <div class="card">
      <img src="${p.image}" onclick="previewImage('${p.image}')">
      <div class="card-content">
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
        <button class="btn" onclick="buyNow()">Buy Now</button>
      </div>
    </div>`;
  });
}

function previewImage(src){
  document.getElementById("previewImg").src=src;
  document.getElementById("imageModal").style.display="flex";
}
function closeImage(){
  document.getElementById("imageModal").style.display="none";
}

function buyNow(){document.getElementById("buyModal").style.display="flex"}
function closeModal(){document.getElementById("buyModal").style.display="none"}

renderProducts();
</script>

</body>
</html>
