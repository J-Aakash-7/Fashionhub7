<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lina Bella Boutique | College Wear</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5d4; 
            --bg-overlay: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(var(--bg-overlay), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1567401893414-76b7b1e5a7a5?q=80&w=870&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .brand-section { text-align: center; padding: 60px 20px 20px; position: relative; }
        .brand-section .main-logo {
            width: 100px; height: auto; margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(0,245,212,0.5));
        }
        .brand-section h2 { 
            font-family: 'Playfair Display', serif; font-size: 32px; 
            letter-spacing: 2px;
        }

        .track-header {
            position: absolute; top: 20px; right: 20px;
            padding: 8px 15px; border: 1px solid var(--primary);
            color: var(--primary); text-decoration: none;
            border-radius: 20px; font-size: 10px; font-weight: 700;
            text-transform: uppercase;
        }

        .controls-container { max-width: 600px; margin: 0 auto 40px; padding: 0 20px; text-align: center; }
        .search-box {
            width: 100%; padding: 15px 25px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50px;
            color: #fff; font-size: 14px; margin-bottom: 20px; outline: none; transition: 0.3s;
        }

        .categories { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }

        .container { padding: 0 20px 50px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-content { padding: 20px; text-align: center; }
        .price { font-size: 20px; color: var(--primary); }

        .btn { width: 100%; padding: 12px; border: 1px solid var(--primary); background: transparent; color: var(--primary); }

        .modal { display: none; position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }

        .order-modal-content {
            background: #fff; padding: 30px; border-radius: 12px;
            width: 90%; max-width: 400px; color: #000; text-align: center;
        }

        .method-btn { padding: 14px; border-radius: 4px; font-weight: 700; display: block; margin-top: 10px; }
        .wa { background: #25D366; color: #fff; }
    </style>
</head>
<body>

<div class="brand-section">
    <a href="https://wa.me/918610328602" class="track-header">Track Order</a>
    <h2>Lina Bella</h2>
</div>

<div class="container">
    <div class="grid" id="productList"></div>
</div>

<div class="modal" id="orderModal">
    <div class="order-modal-content">
        <h3 id="modalProdName"></h3>

        <a href="#" target="_blank" class="method-btn wa" id="waLink">📱 Confirm Order via WhatsApp</a>

        <!-- GOOGLE PAY BUTTON -->
        <button class="method-btn" style="background:#0f9d58;color:#fff;" onclick="payWithGPay()">
            📲 Pay with Google Pay
        </button>
    </div>
</div>

<script>
const whatsappNumber = "918610328602";
const upiId = "aakaskjkmr@okhdfcbank";

let currentProduct = {};
let generatedOrderId = "";

const products = [
    { id:"100", name:"Floral Short Kurtha", price:500, image:"image/sk.jpg"},
    { id:"101", name:"Premium Blue Kurtha", price:2999, image:"image/1.jpg"},
    { id:"102", name:"White Formal Shirt", price:1499, image:"image/2.jpg"},
    { id:"103", name:"Ethnic Red Special", price:899, image:"image/3.jpg"},
    { id:"104", name:"Ethnic Red Special", price:899, image:"image/4.jpg"},
    { id:"105", name:"Ethnic Red Special", price:899, image:"image/5.jpg"},
    { id:"106", name:"Ethnic Red Special", price:899, image:"image/6.jpg"}
];

function loadProducts(){
    const list=document.getElementById("productList");
    products.forEach(p=>{
        list.innerHTML+=`
        <div class="card">
            <img src="${p.image}">
            <div class="card-content">
                <h3>${p.name}</h3>
                <div class="price">₹${p.price}</div>
                <button class="btn" onclick="openOrderModal('${p.name}',${p.price})">Buy</button>
            </div>
        </div>`;
    });
}

function openOrderModal(name,price){
    currentProduct={name,price};
    document.getElementById("modalProdName").innerText=name;
    document.getElementById("waLink").href=`https://wa.me/${whatsappNumber}?text=Order ${name}`;
    document.getElementById("orderModal").style.display="flex";
}

function payWithGPay(){
    const amount=currentProduct.price;
    const upiLink=`upi://pay?pa=${upiId}&pn=LinaBella&am=${amount}&cu=INR`;
    window.location.href=upiLink;
}

loadProducts();
</script>

</body>
</html>
