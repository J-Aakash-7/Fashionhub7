<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lina Bella Boutique | College Wear</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5d4; 
            --bg-overlay: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(var(--bg-overlay), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1567401893414-76b7b1e5a7a5?q=80&w=870&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        /* Brand Section */
        .brand-section { text-align: center; padding: 60px 20px 20px; }
        .brand-section .main-logo {
            width: 100px; height: auto; margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(0,245,212,0.5));
        }
        .brand-section h2 { 
            font-family: 'Playfair Display', serif; font-size: 32px; 
            letter-spacing: 2px;
        }

        /* Search & Filter Container */
        .controls-container {
            max-width: 600px;
            margin: 0 auto 40px;
            padding: 0 20px;
            text-align: center;
        }

        .search-box {
            width: 100%;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            outline: none;
            transition: 0.3s;
        }
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.2);
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cat-btn {
            padding: 8px 15px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .cat-btn.active, .cat-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        /* Grid & Cards */
        .container { padding: 0 20px 80px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            opacity: 0.5;
        }

        .card { 
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px;
            overflow: hidden; transition: 0.4s ease; position: relative;
        }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-content { padding: 20px; text-align: center; }
        .price { font-size: 20px; color: var(--primary); font-weight: 700; margin-bottom: 15px; }

        .btn { 
            width: 100%; padding: 12px; border: 1px solid var(--primary); 
            background: transparent; color: var(--primary); 
            cursor: pointer; font-weight: 700; text-transform: uppercase; border-radius: 4px;
        }
        .btn:hover { background: var(--primary); color: #000; }

        /* Order Modal */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000;
        }
        .order-modal-content {
            background: #fff; padding: 30px; border-radius: 12px;
            width: 90%; max-width: 400px; color: #000; text-align: center; position: relative;
        }
        .size-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; }
        .size-chip {
            padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;
            cursor: pointer; font-size: 12px; font-weight: 700;
        }
        .size-chip.selected { background: #000; color: #fff; border-color: #000; }
        .order-options { display: flex; flex-direction: column; gap: 10px; opacity: 0.2; pointer-events: none; }
        .order-options.active { opacity: 1; pointer-events: auto; }
        .method-btn { padding: 14px; border-radius: 4px; font-weight: 700; text-decoration: none; display: block; }
        .method-btn.wa { background: #25D366; color: #fff; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: #999; }

        .floating-contact {
            position: fixed; bottom: 25px; right: 25px; 
            background: var(--primary); color: #000; padding: 12px 20px; 
            font-size: 11px; font-weight: 800; border-radius: 4px; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="brand-section">
    <img src="lina-bella-logo.png" class="main-logo" alt="Logo">
    <h2>Lina Bella</h2>
</div>

<div class="controls-container">
    <input type="text" id="searchInput" class="search-box" placeholder="Search by name, code, or style..." onkeyup="filterAll()">
    
    <div class="categories">
        <button class="cat-btn active" onclick="setCategory('All', this)">All</button>
        <button class="cat-btn" onclick="setCategory('Short Kurtha', this)">Short Kurtha</button>
        <button class="cat-btn" onclick="setCategory('Formal', this)">Formal</button>
        <button class="cat-btn" onclick="setCategory('Ethnic', this)">Ethnic</button>
    </div>
</div>

<div class="container">
    <div class="grid" id="productList"></div>
</div>

<div class="modal" id="orderModal">
    <div class="order-modal-content">
        <span class="close" onclick="closeOrderModal()">&times;</span>
        <h3 id="modalProdName">Product Name</h3>
        <div class="size-container">
            <div class="size-chip" onclick="selectSize('XS', this)">XS</div>
            <div class="size-chip" onclick="selectSize('S', this)">S</div>
            <div class="size-chip" onclick="selectSize('M', this)">M</div>
            <div class="size-chip" onclick="selectSize('L', this)">L</div>
            <div class="size-chip" onclick="selectSize('XL', this)">XL</div>
            <div class="size-chip" onclick="selectSize('XXL', this)">XXL</div>
        </div>
        <div class="order-options" id="orderActions">
            <a href="#" target="_blank" class="method-btn wa" id="waLink">📱 Order via WhatsApp</a>
        </div>
    </div>
</div>

<a href="tel:8610328602" class="floating-contact">📞 CALL: 8610328602</a>

<script>
    const whatsappNumber = "918610328602";
    let currentCategory = "All";
    let selectedSize = "";
    let currentProduct = {};

    const products = [
        { id: "100", name: "Floral Short Kurtha", price: 500, image: "image/sk.jpg", category: "Short Kurtha" },
        { id: "101", name: "Premium Blue Kurtha", price: 2999, image: "image/1.jpg", category: "Short Kurtha" },
        { id: "102", name: "White Formal Shirt", price: 1499, image: "image/2.jpg", category: "Formal" },
        { id: "103", name: "Ethnic Red Special", price: 899, image: "image/4.jpg", category: "Ethnic" }
    ];

    function filterAll() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const productList = document.getElementById("productList");
        productList.innerHTML = "";

        const filtered = products.filter(p => {
            const matchesCategory = currentCategory === "All" || p.category === currentCategory;
            const matchesSearch = p.name.toLowerCase().includes(searchTerm) || 
                                 p.id.toLowerCase().includes(searchTerm) ||
                                 p.category.toLowerCase().includes(searchTerm);
            return matchesCategory && matchesSearch;
        });

        if (filtered.length === 0) {
            productList.innerHTML = `<div class="no-results">No items found for "${searchTerm}"</div>`;
            return;
        }

        filtered.forEach(p => {
            productList.innerHTML += `
            <div class="card">
                <img src="${p.image}" alt="${p.name}">
                <div class="card-content">
                    <h3>${p.name}</h3>
                    <div class="price">₹${p.price}</div>
                    <button class="btn" onclick="openOrderModal('${p.id}', '${p.name}', '${p.price}')">Buy Now</button>
                </div>
            </div>`;
        });
    }

    function setCategory(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterAll();
    }

    function openOrderModal(id, name, price) {
        currentProduct = { id, name, price };
        selectedSize = "";
        document.getElementById("modalProdName").innerText = name;
        document.getElementById("orderActions").classList.remove('active');
        document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('selected'));
        document.getElementById("orderModal").style.display = "flex";
    }

    function selectSize(size, element) {
        selectedSize = size;
        document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById("orderActions").classList.add('active');
        const message = `Order Request:\nItem: ${currentProduct.name}\nCode: ${currentProduct.id}\nSize: ${selectedSize}\nPrice: ₹${currentProduct.price}`;
        document.getElementById("waLink").href = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
    }

    function closeOrderModal() { document.getElementById("orderModal").style.display = "none"; }

    window.onload = filterAll;
</script>
</body>
</html>
