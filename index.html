<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lina Bella Boutique | College Wear</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f5d4; 
            --bg-overlay: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(var(--bg-overlay), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1567401893414-76b7b1e5a7a5?q=80&w=870&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .brand-section { text-align: center; padding: 60px 20px 20px; position: relative; }
        .brand-section .main-logo { width: 100px; margin-bottom: 15px; }
        .brand-section h2 { font-family: 'Playfair Display', serif; font-size: 32px; }

        .track-header {
            position: absolute; top: 20px; right: 20px;
            padding: 8px 15px; border: 1px solid var(--primary);
            color: var(--primary); text-decoration: none;
            border-radius: 20px; font-size: 10px;
        }

        .controls-container { max-width: 600px; margin: auto; text-align: center; }
        .search-box {
            width: 100%; padding: 15px; border-radius: 50px;
            background: rgba(255,255,255,0.1); border: none; color: white;
        }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 30px; }

        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-content { padding: 20px; text-align: center; }
        .price { color: var(--primary); font-size: 20px; }

        .btn {
            width: 100%; padding: 12px;
            border: 1px solid var(--primary);
            background: transparent; color: var(--primary);
        }

        .modal {
            display: none; position: fixed;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }

        .order-modal-content {
            background: white; padding: 30px;
            border-radius: 10px; color: black;
            width: 90%; max-width: 400px;
        }

        .method-btn {
            padding: 14px;
            border-radius: 4px;
            font-weight: 700;
            text-decoration: none;
            display: block;
            margin-top: 10px;
            text-align: center;
        }

        .wa { background: #25D366; color: #fff; }

    </style>
</head>

<body>

<div class="brand-section">
    <a href="https://wa.me/918122668602" class="track-header">Track Order</a>
    <h2>Lina Bella</h2>
</div>

<div class="container">
    <div class="grid" id="productList"></div>
</div>

<!-- ORDER MODAL -->
<div class="modal" id="orderModal">
    <div class="order-modal-content">
        <h3 id="modalProdName"></h3>

        <a href="#" target="_blank" class="method-btn wa" id="waLink">📱 Order via WhatsApp</a>

        <!-- GOOGLE PAY BUTTON -->
        <button class="method-btn" style="background:#0f9d58;color:#fff;" onclick="payWithGPay()">
            📲 Pay with Google Pay
        </button>
    </div>
</div>

<script>
const whatsappNumber = "918122668602";
const upiId = "aakashjkmr@okhdfcbank"; // 🔴 change this

let currentProduct = {};
let generatedOrderId = "";

const products = [
    { id: "100", name: "Floral Short Kurtha", price: 500, image: "image/sk.jpg" }
];

function loadProducts() {
    const list = document.getElementById("productList");
    products.forEach(p => {
        list.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            <div class="card-content">
                <h3>${p.name}</h3>
                <div class="price">₹${p.price}</div>
                <button class="btn" onclick="openOrderModal('${p.name}', ${p.price})">Buy</button>
            </div>
        </div>`;
    });
}

function openOrderModal(name, price) {
    currentProduct = { name, price };
    generatedOrderId = "LB-" + Math.floor(100000 + Math.random() * 900000);

    document.getElementById("modalProdName").innerText = name;

    document.getElementById("waLink").href =
        `https://wa.me/${whatsappNumber}?text=Order ${name}`;

    document.getElementById("orderModal").style.display = "flex";
}

/* GOOGLE PAY FUNCTION */
function payWithGPay() {
    const amount = currentProduct.price;

    const upiLink = `upi://pay?pa=${upiId}&pn=LinaBella&am=${amount}&cu=INR`;

    window.location.href = upiLink;

    const msg = `Payment Done\nOrder ID: ${generatedOrderId}`;

    setTimeout(() => {
        window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`);
    }, 2000);
}

loadProducts();
</script>

</body>
</html>
